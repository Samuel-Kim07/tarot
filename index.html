<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 데일리 타로 - 나의 운세 확인하기</title>
  <meta name="description" content="매일 아침 7장의 카드 속에서 오직 한 장의 타로 카드를 직접 골라 오늘의 종합운, 연애운, 직업운, 그리고 깊은 조언을 확인해 보세요.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Twinkling stars background -->
  <div class="stars-bg">
    <div class="stars-1"></div>
    <div class="stars-2"></div>
    <div class="nebula-glow"></div>
  </div>

  <header>
    <h1>DAILY TAROT</h1>
    <p class="subtitle">오늘 나의 하루를 비출 별빛의 조언</p>
  </header>

  <main>
    <!-- Welcome screen -->
    <section id="landing-panel" class="landing-panel">
      <p class="intro-desc">
        인생은 끊임없는 선택의 여정입니다.<br>
        조용히 눈을 감고 마음의 준비가 되었을 때,<br>
        오늘 하루 당신의 무의식을 비춰줄 타로 카드를 확인해보세요.
      </p>
      <button id="shuffle-btn" class="btn-primary" aria-label="오늘의 타로카드 셔플하기">카드를 펼치기</button>
    </section>

    <!-- Tarot Card Board -->
    <section id="card-board" class="card-board" aria-label="타로 카드 스프레드 판">
      <!-- Cards will be dynamically loaded here by script.js -->
    </section>

    <!-- Prompt instructions -->
    <div id="board-prompt" class="board-prompt"></div>

    <!-- Reading Results panel -->
    <section id="reading-panel" class="reading-panel" aria-label="타로 리딩 결과">
      <div class="reading-header">
        <p class="reading-tag">오늘의 타로 리딩</p>
        <h2 id="res-card-name" class="reading-card-name">--</h2>
      </div>

      <div class="reading-grid">
        <article class="reading-section">
          <h3 class="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/></svg>
            종합운 (General)
          </h3>
          <p id="res-general" class="section-text">--</p>
        </article>

        <article class="reading-section">
          <h3 class="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            연애운 (Love)
          </h3>
          <p id="res-love" class="section-text">--</p>
        </article>

        <article class="reading-section">
          <h3 class="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            금전/직업운 (Career & Wealth)
          </h3>
          <p id="res-career" class="section-text">--</p>
        </article>

        <article class="reading-section">
          <h3 class="section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            오늘의 조언 (Advice)
          </h3>
          <p id="res-advice" class="section-text">--</p>
        </article>
      </div>

      <div class="reading-actions">
        <!-- Back button will be injected dynamically -->
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Daily Tarot. All Rights Reserved. Designed by Antigravity.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
